<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Fast Food Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">

    <div class="card w-full max-w-sm border-t-4 border-cyan-500 fade-in">
        
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <div class="text-5xl mb-3">🍔</div>
            <h1 class="text-4xl font-black text-white uppercase"
                style="font-family:'Bebas Neue',sans-serif; letter-spacing:0.05em;">
                Fast Food
            </h1>
            <p class="text-xs text-gray-500 mt-2 uppercase tracking-widest">Sistema de Gestión</p>
        </div>

        <!-- Formulario Login -->
        <form id="loginForm" class="space-y-4">
            
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase block mb-1">Usuario</label>
                <input type="text" id="login-nombre" placeholder="Tu nombre de usuario" 
                       class="w-full px-4 py-2.5 bg-slate-700 border border-slate-600 rounded-lg 
                              text-white placeholder-gray-500 focus:outline-none focus:border-cyan-500
                              focus:bg-slate-600 transition-all" required>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-400 uppercase block mb-1">Contraseña</label>
                <input type="password" id="login-pass" placeholder="••••••" 
                       class="w-full px-4 py-2.5 bg-slate-700 border border-slate-600 rounded-lg 
                              text-white placeholder-gray-500 focus:outline-none focus:border-cyan-500
                              focus:bg-slate-600 transition-all" required>
            </div>

            <button type="submit" 
                    class="w-full py-3 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 
                           hover:to-blue-500 text-white font-black uppercase text-sm rounded-lg
                           transition-all active:scale-95 shadow-lg tracking-widest mt-6">
                🔓 Iniciar Sesión
            </button>
        </form>

        <!-- Divisor -->
        <div class="flex items-center gap-3 my-6">
            <div class="flex-1 h-px bg-slate-700"></div>
            <span class="text-xs text-gray-500 uppercase font-bold">o</span>
            <div class="flex-1 h-px bg-slate-700"></div>
        </div>

        <!-- Botón Registro -->
        <a href="registro1.html" 
           class="block w-full py-3 text-center bg-slate-700 hover:bg-slate-600 text-white 
                  font-black uppercase text-sm rounded-lg transition-all active:scale-95 
                  border border-slate-600 tracking-widest">
            📝 Crear Cuenta
        </a>

        <!-- Info -->
        <p class="text-center text-[10px] text-gray-500 mt-6 leading-relaxed">
            <span id="user-count" class="block font-bold text-cyan-400">Cargando...</span>
            <span class="block mt-1">Usa tus credenciales para acceder</span>
        </p>
    </div>

    <script src="registro.js"></script>
    <script>
        // Reemplazar evento de login para usar BD
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const nombre = document.getElementById('login-nombre').value.trim();
                    const password = document.getElementById('login-pass').value;

                    if (!nombre || !password) {
                        showToast('Completa todos los campos', 'error');
                        return;
                    }

                    try {
                        const response = await fetch('login.php', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                'login-nombre': nombre,
                                'login-pass': password
                            })
                        });

                        const data = await response.json();

                        if (data.success) {
                            localStorage.setItem('ff_session', data.usuario);
                            showToast(`¡Bienvenido, ${data.usuario}! 👋`, 'success');
                            setTimeout(() => {
                                window.location.href = 'roles1.html';
                            }, 900);
                        } else {
                            showToast(data.error || 'Error en login', 'error');
                            document.getElementById('login-pass').value = '';
                        }
                    } catch (error) {
                        showToast('Error de conexión: ' + error.message, 'error');
                    }
                });
            }
        });
    </script>
</body>
</html>
